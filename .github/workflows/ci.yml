name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Em pull_request, detecta se houve mudança em código frontend.
      # Em push para main, sempre rodamos os gates (passo abaixo decide).
      - id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/**'
              - 'libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - 'vitest.workspace.ts'
              - 'playwright.config.ts'
              - 'tools/e2e-docker/**'
              - '.github/workflows/ci.yml'

      - id: gate
        name: Decidir se gates frontend rodam
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ steps.changes.outputs.frontend }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Gates frontend habilitados"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "PR sem mudancas em codigo frontend - pulando gates"
          fi

      - name: Iniciar Keycloak
        if: steps.gate.outputs.run == 'true'
        run: |
          docker run -d \
            --name keycloak \
            --network host \
            -e KC_HEALTH_ENABLED=true \
            -e KC_HOSTNAME_STRICT=false \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD || 'admin' }} \
            -v $PWD/tools/e2e-docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro \
            quay.io/keycloak/keycloak:26.5 start-dev --import-realm

      - name: Aguardar Keycloak ficar saudável
        if: steps.gate.outputs.run == 'true'
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:9000/health/ready | grep -q "\"UP\""; do sleep 5; done'

      # This enables task distribution via Nx Cloud.
      # Keep --stop-agents-after aligned with every target executed below so the
      # distributed run cannot finish before all blocking gates are reconciled.
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - if: steps.gate.outputs.run == 'true'
        run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="lint,test,build,typecheck,e2e"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Extrair versão do Playwright
        id: pw-version
        if: steps.gate.outputs.run == 'true'
        run: |
          VERSION=$(node -e "const l=require('./package-lock.json'); console.log(l.packages['node_modules/@playwright/test'].version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache de browsers do Playwright
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps

      - if: steps.gate.outputs.run == 'true'
        run: npx nx record -- echo Hello World

      # Em pull_request, usamos `nx affected` para rodar apenas os projects
      # impactados pelo diff contra a branch base. Em push para main, fazemos
      # sweep completo via `nx run-many` como rede de segurança.
      # --exclude=uniplus-web: o root project tem um target `e2e` inferido
      # pelo @nx/playwright a partir do `playwright.config.ts` da raiz que
      # está mal configurado (testMatch pega specs de Vitest). `nx run-many`
      # historicamente ignorava esse target, mas `nx affected` o invoca.
      # Excluir é cirúrgico; a correção do config raiz fica em issue própria.
      - name: Rodar gates (nx affected — pull_request)
        if: steps.gate.outputs.run == 'true' && github.event_name == 'pull_request'
        run: npx nx affected -t lint test build typecheck e2e --base=origin/${{ github.base_ref }} --head=HEAD --exclude=uniplus-web --nxBail --outputStyle=static
        env:
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD || 'admin' }}

      - name: Rodar gates (nx run-many — push em main)
        if: steps.gate.outputs.run == 'true' && github.event_name == 'push'
        run: npx nx run-many -t lint test build typecheck e2e --nxBail --outputStyle=static
        env:
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD || 'admin' }}

      - if: always() && steps.gate.outputs.run == 'true'
        run: npx nx fix-ci
