name: Publicar imagem E2E runner

on:
  push:
    branches: [main]
    paths:
      - package-lock.json
      - tools/e2e-docker/Dockerfile

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair versão do Playwright
        id: pw-version
        run: |
          VERSION=$(node -e "const l=require('./package-lock.json'); console.log(l.packages['node_modules/@playwright/test'].version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/e2e-docker/Dockerfile
          push: true
          tags: |
            ghcr.io/unifesspa-edu-br/uniplus-e2e-runner:${{ steps.pw-version.outputs.version }}
            ghcr.io/unifesspa-edu-br/uniplus-e2e-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
