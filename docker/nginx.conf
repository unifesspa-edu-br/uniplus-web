# Configuração nginx para servir as apps SPA do Uni+ (selecao, ingresso, portal).
# Imagem base é `nginxinc/nginx-unprivileged` (#4 hardening) — escuta em :8080
# como UID 101, sem CAP_NET_BIND_SERVICE.
#
# Headers de segurança e CSP cobrem o requisito da #4. Runtime config (#84)
# vive em /assets/runtime-config.json, servido aqui mas montado por ConfigMap
# em produção — `connect-src` precisa permitir URLs externas que o ConfigMap
# define em runtime (Keycloak, API), por isso `connect-src` é permissivo.

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Healthcheck estático (smoke pós-build via docker run + curl).
    location = /health.json {
        access_log off;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok"}';
    }

    # Runtime config (ADR-0020 + #84) — sobrescrito por ConfigMap em produção.
    # `no-store` garante que o navegador sempre busca a versão atual ao carregar
    # a app, mesmo após bump de ConfigMap sem rolling restart.
    location = /assets/runtime-config.json {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Silent SSO check do Keycloak (`auth.service.ts: onLoad: 'check-sso'`).
    # O HTML carregado em iframe contém um inline `<script>parent.postMessage(...)`
    # que é bloqueado pela CSP global (`script-src 'self'` sem `'unsafe-inline'`).
    # Esta location explicita a CSP relaxada SOMENTE para esse arquivo —
    # nginx requer redeclarar TODOS os add_header desejados quando algum é
    # definido na location (regra de override do `add_header`).
    location = /assets/silent-check-sso.html {
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src *; frame-src *; frame-ancestors 'self';" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers de segurança (#4). HSTS aplicado pelo gateway TLS em produção
    # mas declarado aqui também para defesa em profundidade.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # `connect-src *` é necessário porque a URL real de Keycloak e API vem do
    # ConfigMap em runtime (não embutida na imagem — ADR-0020); apertar exige
    # build-time substitution que viola o invariante "imagem única por app".
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src *; frame-src *; frame-ancestors 'self';" always;
}
